# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     354858054593504257       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "IEEE Open Silico"      # Project title
  author:       "Vincent Sunio"      # Your name
  discord:      "xxx"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "DE LASALLE"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
