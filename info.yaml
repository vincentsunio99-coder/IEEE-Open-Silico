  ui[0]: In0
  ui[1]: In1
  ui[2]: In2
  ui[3]: In3
  ui[4]: In4
  ui[5]: In5
  ui[6]: In6
  ui[7]: In7

  # Outputs
  uo[0]: Out0
  uo[1]: Out1
  uo[2]: Out2
  uo[3]: Out3
  uo[4]: Out4
  uo[5]: Out5
  uo[6]: Out6
  uo[7]: Out7

  # Bidirectional pins
  uio[0]: Bi0
  uio[1]: Bi1
  uio[2]: Bi2
  uio[3]: Bi3
  uio[4]: Bi4
  uio[5]: Bi5
